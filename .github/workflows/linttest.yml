name: Linting and Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # This will run bandit and produce a security report if there are any failures
  linting:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
      - name: Install Dependencies
        run: |
          pip install .[test]
        with:
          python-version: ${{ matrix.pyver }}
      - name: Install linters
        run: pip install ruff bandit ty

      - name: Lint (ruff)
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Typing (ty)
        run: ty check .
      - name: Security scan (bandit)
        run: bandit -r src/

  # This will run pytest against the specified version
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyver: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pyver }}

      - name: Install Dependencies
        run: |
          pip install .[test]

      - name: Run Pytest
        run: pytest